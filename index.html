<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>CaseTimer</title>
<meta name="theme-color" content="#1f2937">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<style>
  :root{
    --bg:#0f172a;
    --panel:#1e293b;
    --panel-2:#273449;
    --text:#e5e7eb;
    --text-dim:#94a3b8;
    --accent:#3b82f6;
    --accent-2:#60a5fa;
    --ok:#22c55e;
    --warn:#f59e0b;
    --danger:#ef4444;
    --border:#334155;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Hiragino Sans,"Yu Gothic",Meiryo,sans-serif;
    -webkit-tap-highlight-color:transparent;
  }
  #app{
    max-width:520px;
    margin:0 auto;
    min-height:100dvh;
    display:flex;
    flex-direction:column;
    padding:16px;
    padding-bottom:calc(16px + env(safe-area-inset-bottom));
  }
  header{
    text-align:center;
    margin-bottom:16px;
  }
  header h1{
    font-size:20px;
    margin:0;
    letter-spacing:0.02em;
    color:var(--accent-2);
  }
  section{flex:1; display:flex; flex-direction:column; gap:14px;}
  .card{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:14px;
    padding:14px;
  }
  h2{font-size:14px; margin:0 0 10px; color:var(--text-dim); font-weight:600;}
  input[type="text"], input[type="number"], textarea{
    background:var(--panel-2);
    border:1px solid var(--border);
    color:var(--text);
    border-radius:8px;
    padding:8px 10px;
    font-size:14px;
    font-family:inherit;
  }
  input:focus, textarea:focus, button:focus{
    outline:2px solid var(--accent);
    outline-offset:1px;
  }
  button{cursor:pointer; font-family:inherit;}
  .btn{
    border:none;
    border-radius:10px;
    padding:11px 14px;
    font-size:14px;
    font-weight:600;
    color:#fff;
    background:var(--accent);
  }
  .btn.secondary{
    background:var(--panel-2);
    color:var(--text);
    border:1px solid var(--border);
  }
  .btn.block{width:100%;}
  .btn:disabled{opacity:0.4; cursor:not-allowed;}
  .control-row{display:flex; gap:8px;}
  .control-row .btn{flex:1;}

  /* --- Setup: mode tabs --- */
  .mode-tabs{display:flex; gap:8px;}
  .mode-tab{
    flex:1;
    padding:10px;
    border-radius:10px;
    border:1px solid var(--border);
    background:var(--panel-2);
    color:var(--text-dim);
    font-size:14px;
    font-weight:600;
  }
  .mode-tab.active{
    background:var(--accent);
    color:#fff;
    border-color:var(--accent);
  }
  .time-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:8px;
  }
  .time-row label{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:14px;
    width:100%;
    justify-content:space-between;
  }
  .time-row input{width:70px; text-align:right;}
  .label-row{
    display:flex;
    gap:8px;
    align-items:center;
    margin-bottom:8px;
  }
  .label-row input{flex:1; min-width:0;}
  .icon-btn{
    background:var(--panel-2);
    border:1px solid var(--border);
    color:var(--text-dim);
    border-radius:8px;
    width:34px;
    height:34px;
    font-size:16px;
    flex-shrink:0;
  }
  .icon-btn:hover{color:var(--danger); border-color:var(--danger);}
  .add-btn{
    width:100%;
    padding:10px;
    border:1px dashed var(--border);
    background:transparent;
    color:var(--text-dim);
    border-radius:10px;
    font-size:14px;
  }

  /* --- Timer screens --- */
  .stage-badge{
    text-align:center;
    font-size:13px;
    color:var(--accent-2);
    font-weight:700;
    letter-spacing:0.05em;
  }
  .time-display{
    text-align:center;
    font-size:60px;
    font-weight:700;
    font-variant-numeric:tabular-nums;
    letter-spacing:0.02em;
    margin:2px 0 10px;
  }
  .time-display.warn{color:var(--warn);}
  .time-display.danger{color:var(--danger); animation:pulse 1s infinite;}
  @keyframes pulse{
    0%,100%{opacity:1;}
    50%{opacity:0.55;}
  }
  .progress-outer{
    height:10px;
    background:var(--panel-2);
    border-radius:6px;
    overflow:hidden;
    margin-bottom:14px;
  }
  .progress-inner{
    height:100%;
    background:var(--ok);
    width:0%;
    transition:width 0.2s linear, background 0.3s;
  }
  .progress-inner.warn{background:var(--warn);}
  .progress-inner.danger{background:var(--danger);}

  .current-lap{
    text-align:center;
    font-size:13px;
    color:var(--text-dim);
    margin-bottom:2px;
  }
  .current-lap b{color:var(--text); font-size:15px;}
  .lap-buttons{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
  }
  .lap-btn{
    flex:1 1 calc(50% - 8px);
    padding:12px 8px;
    border-radius:10px;
    border:1px solid var(--border);
    background:var(--panel-2);
    color:var(--text);
    font-size:14px;
    font-weight:600;
  }
  .lap-btn.active{
    background:var(--accent);
    border-color:var(--accent);
    color:#fff;
  }
  .custom-lap-row{display:flex; gap:8px;}
  .custom-lap-row input{flex:1;}

  textarea#memo-thinking, textarea#memo-presentation, textarea#memo-summary{
    width:100%;
    min-height:90px;
    resize:vertical;
  }

  /* --- Summary --- */
  table{width:100%; border-collapse:collapse; font-size:13px;}
  th,td{text-align:left; padding:6px 4px; border-bottom:1px solid var(--border);}
  th{color:var(--text-dim); font-weight:600;}
  td.num, th.num{text-align:right; font-variant-numeric:tabular-nums;}
  .total-line{
    display:flex;
    justify-content:space-between;
    color:var(--text-dim);
    font-size:13px;
    margin-top:6px;
  }

  /* --- History --- */
  .history-item{
    border:1px solid var(--border);
    border-radius:10px;
    padding:10px 12px;
    margin-bottom:8px;
    background:var(--panel-2);
  }
  .history-item .hi-head{
    display:flex;
    justify-content:space-between;
    align-items:center;
    cursor:pointer;
    font-size:13px;
  }
  .history-item .hi-head .hi-mode{color:var(--accent-2); font-weight:700;}
  .history-item .hi-head .hi-date{color:var(--text-dim);}
  .history-item .hi-detail{
    margin-top:8px;
    font-size:12px;
    color:var(--text-dim);
  }
  .history-item .hi-detail table{font-size:12px;}
  .history-item .hi-memo-label{
    margin-top:8px;
  }
  .history-item textarea.hi-memo{
    display:block;
    width:100%;
    min-height:64px;
    margin-top:4px;
    resize:vertical;
    font-size:12px;
  }
  .empty-note{color:var(--text-dim); font-size:13px; text-align:center; padding:8px 0;}
  [hidden]{display:none !important;}
</style>
</head>
<body>
<div id="app">
  <header><h1>CaseTimer</h1></header>

  <!-- Setup screen -->
  <section id="setup-screen">
    <div class="card">
      <h2>モード</h2>
      <div class="mode-tabs">
        <button class="mode-tab" id="mode-case-btn" data-mode="case">ケース面接</button>
        <button class="mode-tab" id="mode-fermi-btn" data-mode="fermi">フェルミ推定</button>
      </div>
    </div>
    <div class="card">
      <h2>時間設定</h2>
      <div class="time-row">
        <label>思考時間 <span><input type="number" id="thinking-minutes" min="1" max="60"> 分</span></label>
      </div>
      <div class="time-row">
        <label>発表時間 <span><input type="number" id="presentation-minutes" min="1" max="60"> 分</span></label>
      </div>
    </div>
    <div class="card">
      <h2>ラップラベル(思考中に切り替えるフェーズ名)</h2>
      <div id="lap-label-list"></div>
      <button class="add-btn" id="add-label-btn">+ ラベルを追加</button>
    </div>
    <button class="btn block" id="start-btn">思考タイマー開始</button>
    <button class="btn secondary block" id="history-btn">履歴を見る</button>
  </section>

  <!-- Thinking stage -->
  <section id="thinking-screen" hidden>
    <div class="stage-badge" id="thinking-mode-label">思考タイム</div>
    <div class="time-display" id="thinking-time-display">05:00</div>
    <div class="progress-outer"><div class="progress-inner" id="thinking-progress"></div></div>
    <div class="current-lap">現在: <b id="current-lap-name">-</b>(<span id="current-lap-time">00:00</span>)</div>
    <div class="lap-buttons" id="lap-buttons"></div>
    <div class="custom-lap-row">
      <input type="text" id="custom-lap-input" placeholder="カスタムラベルで切替">
      <button class="btn secondary" id="custom-lap-btn">切替</button>
    </div>
    <div class="control-row">
      <button class="btn" id="thinking-pause-btn">一時停止</button>
      <button class="btn secondary" id="thinking-reset-btn">リセット</button>
    </div>
    <button class="btn block" id="to-presentation-btn">発表へ進む →</button>
    <div class="card">
      <h2>メモ</h2>
      <textarea id="memo-thinking" placeholder="気づいたこと、時間配分の反省などを自由に記入"></textarea>
    </div>
  </section>

  <!-- Presentation stage -->
  <section id="presentation-screen" hidden>
    <div class="stage-badge">発表タイム</div>
    <div class="time-display" id="presentation-time-display">03:00</div>
    <div class="progress-outer"><div class="progress-inner" id="presentation-progress"></div></div>
    <div class="control-row">
      <button class="btn" id="presentation-pause-btn">一時停止</button>
      <button class="btn secondary" id="presentation-reset-btn">リセット</button>
    </div>
    <button class="btn secondary block" id="finish-btn">終了する</button>
    <div class="card">
      <h2>メモ</h2>
      <textarea id="memo-presentation" placeholder="気づいたこと、時間配分の反省などを自由に記入"></textarea>
    </div>
  </section>

  <!-- Summary screen -->
  <section id="summary-screen" hidden>
    <div class="card">
      <h2>思考タイムのラップ</h2>
      <table>
        <thead><tr><th>ラベル</th><th class="num">時間</th><th class="num">割合</th></tr></thead>
        <tbody id="lap-log-body"></tbody>
      </table>
      <div class="total-line"><span>思考 合計(実績/制限)</span><span id="thinking-total"></span></div>
    </div>
    <div class="card">
      <h2>発表タイム</h2>
      <div class="total-line"><span>実績 / 制限</span><span id="presentation-total"></span></div>
    </div>
    <div class="card">
      <h2>メモ</h2>
      <textarea id="memo-summary" placeholder="気づいたこと、時間配分の反省などを自由に記入"></textarea>
    </div>
    <button class="btn block" id="restart-btn">もう一度</button>
  </section>

  <!-- History screen -->
  <section id="history-screen" hidden>
    <div class="card">
      <h2>履歴(この端末のブラウザに保存)</h2>
      <div id="history-list"></div>
    </div>
    <button class="btn secondary block" id="clear-history-btn">全履歴を削除</button>
    <button class="btn block" id="history-back-btn">戻る</button>
  </section>
</div>

<script>
(function(){
  "use strict";

  var LS_MODE = "caseTimer.mode";
  var LS_CONFIG_PREFIX = "caseTimer.config.";
  var LS_MEMO = "caseTimer.memo";
  var LS_HISTORY = "caseTimer.history";
  var HISTORY_MAX = 50;

  var MODE_LABEL = {case:"ケース面接", fermi:"フェルミ推定"};

  var MODE_DEFAULTS = {
    case: {
      thinkingMinutes: 5,
      presentationMinutes: 3,
      laps: ["前提確認", "現状分析", "ボトルネック特定", "施策立案", "施策評価"]
    },
    fermi: {
      thinkingMinutes: 5,
      presentationMinutes: 3,
      laps: ["前提設定", "因数分解", "計算", "検算"]
    }
  };

  // ---------- DOM refs ----------
  var setupScreen = document.getElementById("setup-screen");
  var thinkingScreen = document.getElementById("thinking-screen");
  var presentationScreen = document.getElementById("presentation-screen");
  var summaryScreen = document.getElementById("summary-screen");
  var historyScreen = document.getElementById("history-screen");

  var modeCaseBtn = document.getElementById("mode-case-btn");
  var modeFermiBtn = document.getElementById("mode-fermi-btn");
  var thinkingMinutesInput = document.getElementById("thinking-minutes");
  var presentationMinutesInput = document.getElementById("presentation-minutes");
  var lapLabelListEl = document.getElementById("lap-label-list");
  var addLabelBtn = document.getElementById("add-label-btn");
  var startBtn = document.getElementById("start-btn");
  var historyBtn = document.getElementById("history-btn");

  var thinkingModeLabelEl = document.getElementById("thinking-mode-label");
  var thinkingTimeDisplayEl = document.getElementById("thinking-time-display");
  var thinkingProgressEl = document.getElementById("thinking-progress");
  var currentLapNameEl = document.getElementById("current-lap-name");
  var currentLapTimeEl = document.getElementById("current-lap-time");
  var lapButtonsEl = document.getElementById("lap-buttons");
  var customLapInput = document.getElementById("custom-lap-input");
  var customLapBtn = document.getElementById("custom-lap-btn");
  var thinkingPauseBtn = document.getElementById("thinking-pause-btn");
  var thinkingResetBtn = document.getElementById("thinking-reset-btn");
  var toPresentationBtn = document.getElementById("to-presentation-btn");
  var memoThinkingEl = document.getElementById("memo-thinking");

  var presentationTimeDisplayEl = document.getElementById("presentation-time-display");
  var presentationProgressEl = document.getElementById("presentation-progress");
  var presentationPauseBtn = document.getElementById("presentation-pause-btn");
  var presentationResetBtn = document.getElementById("presentation-reset-btn");
  var finishBtn = document.getElementById("finish-btn");
  var memoPresentationEl = document.getElementById("memo-presentation");

  var lapLogBodyEl = document.getElementById("lap-log-body");
  var thinkingTotalEl = document.getElementById("thinking-total");
  var presentationTotalEl = document.getElementById("presentation-total");
  var memoSummaryEl = document.getElementById("memo-summary");
  var restartBtn = document.getElementById("restart-btn");

  var historyListEl = document.getElementById("history-list");
  var clearHistoryBtn = document.getElementById("clear-history-btn");
  var historyBackBtn = document.getElementById("history-back-btn");

  // ---------- persistence ----------
  function loadMode(){
    return localStorage.getItem(LS_MODE) === "fermi" ? "fermi" : "case";
  }
  function saveMode(m){ localStorage.setItem(LS_MODE, m); }

  function loadConfig(mode){
    try{
      var raw = localStorage.getItem(LS_CONFIG_PREFIX + mode);
      if(raw){
        var parsed = JSON.parse(raw);
        if(parsed && Array.isArray(parsed.laps)) return parsed;
      }
    }catch(e){}
    var d = MODE_DEFAULTS[mode];
    return {thinkingMinutes: d.thinkingMinutes, presentationMinutes: d.presentationMinutes, laps: d.laps.slice()};
  }
  function saveConfig(mode, cfg){
    localStorage.setItem(LS_CONFIG_PREFIX + mode, JSON.stringify(cfg));
  }

  function loadMemo(){ return localStorage.getItem(LS_MEMO) || ""; }
  function saveMemo(v){ localStorage.setItem(LS_MEMO, v); }

  function loadHistory(){
    try{
      var raw = localStorage.getItem(LS_HISTORY);
      if(raw){ var arr = JSON.parse(raw); if(Array.isArray(arr)) return arr; }
    }catch(e){}
    return [];
  }
  function saveHistory(arr){
    localStorage.setItem(LS_HISTORY, JSON.stringify(arr.slice(0, HISTORY_MAX)));
  }

  // ---------- state ----------
  var currentMode = loadMode();
  var config = loadConfig(currentMode);
  var clock = null; // active stage clock
  var tickHandle = null;
  var thinkingResult = null; // {limitMs, laps:[{label,durationMs}]}

  // ================= Setup screen =================
  function renderModeTabs(){
    modeCaseBtn.classList.toggle("active", currentMode === "case");
    modeFermiBtn.classList.toggle("active", currentMode === "fermi");
  }

  function renderSetupFields(){
    thinkingMinutesInput.value = config.thinkingMinutes;
    presentationMinutesInput.value = config.presentationMinutes;
    renderLapLabelList();
  }

  function renderLapLabelList(){
    lapLabelListEl.innerHTML = "";
    config.laps.forEach(function(label, idx){
      var row = document.createElement("div");
      row.className = "label-row";

      var input = document.createElement("input");
      input.type = "text";
      input.value = label;
      input.placeholder = "ラベル名";
      input.addEventListener("input", function(){
        config.laps[idx] = input.value;
        saveConfig(currentMode, config);
      });

      var delBtn = document.createElement("button");
      delBtn.className = "icon-btn";
      delBtn.textContent = "✕";
      delBtn.title = "削除";
      delBtn.addEventListener("click", function(){
        config.laps.splice(idx, 1);
        saveConfig(currentMode, config);
        renderLapLabelList();
      });

      row.appendChild(input);
      row.appendChild(delBtn);
      lapLabelListEl.appendChild(row);
    });
  }

  function switchMode(mode){
    currentMode = mode;
    saveMode(mode);
    config = loadConfig(mode);
    renderModeTabs();
    renderSetupFields();
  }

  modeCaseBtn.addEventListener("click", function(){ switchMode("case"); });
  modeFermiBtn.addEventListener("click", function(){ switchMode("fermi"); });

  thinkingMinutesInput.addEventListener("input", function(){
    var v = parseInt(thinkingMinutesInput.value, 10);
    config.thinkingMinutes = (isNaN(v) || v < 1) ? 1 : v;
    saveConfig(currentMode, config);
  });
  presentationMinutesInput.addEventListener("input", function(){
    var v = parseInt(presentationMinutesInput.value, 10);
    config.presentationMinutes = (isNaN(v) || v < 1) ? 1 : v;
    saveConfig(currentMode, config);
  });

  addLabelBtn.addEventListener("click", function(){
    config.laps.push("新しいラベル");
    saveConfig(currentMode, config);
    renderLapLabelList();
  });

  startBtn.addEventListener("click", function(){
    startSession();
  });

  historyBtn.addEventListener("click", function(){
    showScreen(historyScreen);
    renderHistory();
  });

  // ================= Screen switching =================
  function showScreen(target){
    [setupScreen, thinkingScreen, presentationScreen, summaryScreen, historyScreen].forEach(function(s){
      s.hidden = (s !== target);
    });
    window.scrollTo(0, 0);
  }

  // ================= Session / stage clock =================
  function formatTime(ms){
    var totalSec = Math.ceil(ms/1000);
    if(totalSec < 0) totalSec = 0;
    var m = Math.floor(totalSec/60);
    var s = totalSec%60;
    return (m<10?"0":"")+m+":"+(s<10?"0":"")+s;
  }

  function startTicking(){
    stopTicking();
    tickHandle = setInterval(tick, 200);
  }
  function stopTicking(){
    if(tickHandle){ clearInterval(tickHandle); tickHandle = null; }
  }

  function startSession(){
    thinkingResult = null;
    saveMemo("");
    memoThinkingEl.value = "";
    startThinkingStage();
    showScreen(thinkingScreen);
  }

  function startThinkingStage(){
    var firstLabel = config.laps.length ? config.laps[0] : "思考";
    clock = {
      type: "thinking",
      limitMs: config.thinkingMinutes * 60000,
      elapsedMs: 0,
      running: true,
      lastTick: Date.now(),
      laps: [{label: firstLabel, startMs: 0, endMs: null}]
    };
    thinkingModeLabelEl.textContent = MODE_LABEL[currentMode] + " ・ 思考タイム";
    renderLapButtons();
    startTicking();
    renderThinkingScreen();
  }

  function renderLapButtons(){
    lapButtonsEl.innerHTML = "";
    config.laps.forEach(function(label){
      var btn = document.createElement("button");
      btn.className = "lap-btn";
      btn.textContent = label;
      btn.addEventListener("click", function(){ switchLap(label); });
      lapButtonsEl.appendChild(btn);
    });
  }

  function switchLap(label){
    if(!clock || clock.type !== "thinking") return;
    var openLap = clock.laps[clock.laps.length-1];
    if(openLap && openLap.endMs === null){
      if(openLap.label === label) return; // no-op if same label tapped again
      openLap.endMs = clock.elapsedMs;
    }
    clock.laps.push({label: label, startMs: clock.elapsedMs, endMs: null});
    renderThinkingScreen();
  }

  customLapBtn.addEventListener("click", function(){
    var label = customLapInput.value.trim();
    if(!label) return;
    switchLap(label);
    customLapInput.value = "";
  });

  function tick(){
    if(!clock || !clock.running) return;
    var now = Date.now();
    clock.elapsedMs += (now - clock.lastTick);
    clock.lastTick = now;
    if(clock.elapsedMs >= clock.limitMs){
      clock.elapsedMs = clock.limitMs;
      if(clock.type === "thinking"){
        renderThinkingScreen();
        finalizeThinkingStage();
        playBeep();
        startPresentationStage();
        showScreen(presentationScreen);
      } else {
        renderPresentationScreen();
        finalizePresentationStage();
        playBeep();
        goToSummary();
      }
      return;
    }
    if(clock.type === "thinking") renderThinkingScreen();
    else renderPresentationScreen();
  }

  function applyDisplayClasses(timeEl, progressEl, remainRatio){
    timeEl.classList.remove("warn","danger");
    progressEl.classList.remove("warn","danger");
    if(remainRatio <= 0.1){
      timeEl.classList.add("danger");
      progressEl.classList.add("danger");
    } else if(remainRatio <= 0.3){
      timeEl.classList.add("warn");
      progressEl.classList.add("warn");
    }
  }

  function renderThinkingScreen(){
    var c = clock;
    var remainMs = Math.max(0, c.limitMs - c.elapsedMs);
    thinkingTimeDisplayEl.textContent = formatTime(remainMs);
    var ratio = c.limitMs > 0 ? (c.elapsedMs / c.limitMs) : 0;
    thinkingProgressEl.style.width = Math.min(100, ratio*100) + "%";
    applyDisplayClasses(thinkingTimeDisplayEl, thinkingProgressEl, 1-ratio);

    var openLap = c.laps[c.laps.length-1];
    currentLapNameEl.textContent = openLap.label;
    currentLapTimeEl.textContent = formatTime(c.elapsedMs - openLap.startMs);

    var buttons = lapButtonsEl.querySelectorAll(".lap-btn");
    buttons.forEach(function(btn){
      btn.classList.toggle("active", btn.textContent === openLap.label);
    });

    thinkingPauseBtn.textContent = c.running ? "一時停止" : "再開";
  }

  thinkingPauseBtn.addEventListener("click", function(){
    if(!clock) return;
    if(clock.running){ clock.running = false; }
    else { clock.running = true; clock.lastTick = Date.now(); }
    renderThinkingScreen();
  });

  thinkingResetBtn.addEventListener("click", function(){
    if(!clock || clock.type !== "thinking") return;
    var currentLabel = clock.laps[clock.laps.length-1].label;
    clock.elapsedMs = 0;
    clock.running = false;
    clock.laps = [{label: currentLabel, startMs: 0, endMs: null}];
    renderThinkingScreen();
  });

  function finalizeThinkingStage(){
    stopTicking();
    var openLap = clock.laps[clock.laps.length-1];
    if(openLap && openLap.endMs === null) openLap.endMs = clock.elapsedMs;
    thinkingResult = {
      limitMs: clock.limitMs,
      usedMs: clock.elapsedMs,
      laps: clock.laps.map(function(l){
        return {label: l.label, durationMs: (l.endMs===null?clock.elapsedMs:l.endMs) - l.startMs};
      })
    };
  }

  toPresentationBtn.addEventListener("click", function(){
    if(!clock || clock.type !== "thinking") return;
    finalizeThinkingStage();
    startPresentationStage();
    showScreen(presentationScreen);
  });

  function startPresentationStage(){
    memoPresentationEl.value = loadMemo();
    clock = {
      type: "presentation",
      limitMs: config.presentationMinutes * 60000,
      elapsedMs: 0,
      running: true,
      lastTick: Date.now()
    };
    startTicking();
    renderPresentationScreen();
  }

  function renderPresentationScreen(){
    var c = clock;
    var remainMs = Math.max(0, c.limitMs - c.elapsedMs);
    presentationTimeDisplayEl.textContent = formatTime(remainMs);
    var ratio = c.limitMs > 0 ? (c.elapsedMs / c.limitMs) : 0;
    presentationProgressEl.style.width = Math.min(100, ratio*100) + "%";
    applyDisplayClasses(presentationTimeDisplayEl, presentationProgressEl, 1-ratio);
    presentationPauseBtn.textContent = c.running ? "一時停止" : "再開";
  }

  presentationPauseBtn.addEventListener("click", function(){
    if(!clock) return;
    if(clock.running){ clock.running = false; }
    else { clock.running = true; clock.lastTick = Date.now(); }
    renderPresentationScreen();
  });

  presentationResetBtn.addEventListener("click", function(){
    if(!clock || clock.type !== "presentation") return;
    clock.elapsedMs = 0;
    clock.running = false;
    renderPresentationScreen();
  });

  var presentationResult = null;
  function finalizePresentationStage(){
    stopTicking();
    presentationResult = {limitMs: clock.limitMs, usedMs: clock.elapsedMs};
  }

  finishBtn.addEventListener("click", function(){
    if(!clock || clock.type !== "presentation") return;
    finalizePresentationStage();
    goToSummary();
  });

  memoThinkingEl.addEventListener("input", function(){ saveMemo(memoThinkingEl.value); });
  memoPresentationEl.addEventListener("input", function(){ saveMemo(memoPresentationEl.value); });

  function updateHistoryMemo(id, memo){
    var history = loadHistory();
    var entry = history.find(function(e){ return e.id === id; });
    if(!entry) return;
    entry.memo = memo;
    saveHistory(history);
  }

  var lastHistoryId = null;
  memoSummaryEl.addEventListener("input", function(){
    saveMemo(memoSummaryEl.value);
    if(lastHistoryId !== null) updateHistoryMemo(lastHistoryId, memoSummaryEl.value);
  });

  // ================= Summary =================
  function goToSummary(){
    renderSummary();
    saveSessionToHistory();
    showScreen(summaryScreen);
  }

  function renderSummary(){
    lapLogBodyEl.innerHTML = "";
    var tr, totalUsed = thinkingResult ? thinkingResult.usedMs : 0;
    if(thinkingResult){
      thinkingResult.laps.forEach(function(l){
        var pct = totalUsed > 0 ? Math.round((l.durationMs/totalUsed)*100) : 0;
        tr = document.createElement("tr");
        tr.innerHTML =
          "<td>" + escapeHtml(l.label) + "</td>" +
          "<td class='num'>" + formatTime(l.durationMs) + "</td>" +
          "<td class='num'>" + pct + "%</td>";
        lapLogBodyEl.appendChild(tr);
      });
      thinkingTotalEl.textContent = formatTime(thinkingResult.usedMs) + " / " + formatTime(thinkingResult.limitMs);
    } else {
      thinkingTotalEl.textContent = "-";
    }
    if(presentationResult){
      presentationTotalEl.textContent = formatTime(presentationResult.usedMs) + " / " + formatTime(presentationResult.limitMs);
    } else {
      presentationTotalEl.textContent = "-";
    }
    memoSummaryEl.value = loadMemo();
  }

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, function(c){
      return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];
    });
  }

  function saveSessionToHistory(){
    var history = loadHistory();
    var entry = {
      id: Date.now(),
      dateStr: new Date().toLocaleString("ja-JP"),
      mode: currentMode,
      thinking: thinkingResult,
      presentation: presentationResult,
      memo: loadMemo()
    };
    history.unshift(entry);
    saveHistory(history);
    lastHistoryId = entry.id;
  }

  restartBtn.addEventListener("click", function(){
    thinkingResult = null;
    presentationResult = null;
    clock = null;
    showScreen(setupScreen);
    renderModeTabs();
    renderSetupFields();
  });

  // ================= History =================
  function renderHistory(){
    var history = loadHistory();
    historyListEl.innerHTML = "";
    if(history.length === 0){
      var empty = document.createElement("div");
      empty.className = "empty-note";
      empty.textContent = "まだ記録がありません";
      historyListEl.appendChild(empty);
      return;
    }
    history.forEach(function(entry){
      var item = document.createElement("div");
      item.className = "history-item";

      var head = document.createElement("div");
      head.className = "hi-head";
      var thinkSummary = entry.thinking ? (formatTime(entry.thinking.usedMs) + "/" + formatTime(entry.thinking.limitMs)) : "-";
      var presSummary = entry.presentation ? (formatTime(entry.presentation.usedMs) + "/" + formatTime(entry.presentation.limitMs)) : "-";
      head.innerHTML =
        "<span class='hi-mode'>" + escapeHtml(MODE_LABEL[entry.mode] || entry.mode) + "</span>" +
        "<span class='hi-date'>" + escapeHtml(entry.dateStr) + "</span>";

      var quick = document.createElement("div");
      quick.className = "hi-detail";
      quick.textContent = "思考 " + thinkSummary + " ／ 発表 " + presSummary + "(タップで詳細)";

      var detail = document.createElement("div");
      detail.className = "hi-detail";
      detail.hidden = true;

      var table = document.createElement("table");
      var rows = "<thead><tr><th>ラベル</th><th class='num'>時間</th></tr></thead><tbody>";
      if(entry.thinking && entry.thinking.laps){
        entry.thinking.laps.forEach(function(l){
          rows += "<tr><td>" + escapeHtml(l.label) + "</td><td class='num'>" + formatTime(l.durationMs) + "</td></tr>";
        });
      }
      rows += "</tbody>";
      table.innerHTML = rows;
      detail.appendChild(table);

      var memoLabel = document.createElement("div");
      memoLabel.className = "hi-memo-label";
      memoLabel.textContent = "メモ";
      detail.appendChild(memoLabel);

      var memoTextarea = document.createElement("textarea");
      memoTextarea.className = "hi-memo";
      memoTextarea.value = entry.memo || "";
      memoTextarea.placeholder = "メモを追記";
      memoTextarea.addEventListener("click", function(e){ e.stopPropagation(); });
      memoTextarea.addEventListener("input", function(){
        updateHistoryMemo(entry.id, memoTextarea.value);
      });
      detail.appendChild(memoTextarea);

      head.addEventListener("click", function(){
        detail.hidden = !detail.hidden;
      });

      item.appendChild(head);
      item.appendChild(quick);
      item.appendChild(detail);
      historyListEl.appendChild(item);
    });
  }

  clearHistoryBtn.addEventListener("click", function(){
    if(!confirm("すべての履歴を削除します。よろしいですか？")) return;
    saveHistory([]);
    renderHistory();
  });

  historyBackBtn.addEventListener("click", function(){
    showScreen(setupScreen);
  });

  // ================= Sound =================
  var audioCtx = null;
  function playBeep(){
    try{
      if(!audioCtx){
        var AC = window.AudioContext || window.webkitAudioContext;
        audioCtx = new AC();
      }
      if(audioCtx.state === "suspended") audioCtx.resume();
      var now = audioCtx.currentTime;
      [0, 0.22, 0.44].forEach(function(offset){
        var osc = audioCtx.createOscillator();
        var gain = audioCtx.createGain();
        osc.type = "sine";
        osc.frequency.value = 880;
        gain.gain.setValueAtTime(0.0001, now+offset);
        gain.gain.exponentialRampToValueAtTime(0.3, now+offset+0.02);
        gain.gain.exponentialRampToValueAtTime(0.0001, now+offset+0.18);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(now+offset);
        osc.stop(now+offset+0.2);
      });
    }catch(e){}
  }

  document.addEventListener("click", function unlock(){
    try{
      if(!audioCtx){
        var AC = window.AudioContext || window.webkitAudioContext;
        audioCtx = new AC();
      }
      if(audioCtx.state === "suspended") audioCtx.resume();
    }catch(e){}
    document.removeEventListener("click", unlock);
  }, {once:true});

  // ================= Service worker =================
  if("serviceWorker" in navigator && location.protocol.indexOf("http") === 0){
    window.addEventListener("load", function(){
      navigator.serviceWorker.register("sw.js").catch(function(){});
    });
  }

  // ================= init =================
  renderModeTabs();
  renderSetupFields();
})();
</script>
</body>
</html>
